name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: test
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"
  NEXTAUTH_SECRET: "test-secret-for-ci"
  NEXTAUTH_URL: "http://localhost:3000"
  AUTH_SECRET: "test-secret-for-ci"
  AUTH_URL: "http://localhost:3000"
  RESEND_APIKEY: "re_dummy_key_for_ci_build"

jobs:
  build:
    name: Build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-build-${{ github.run_id }} \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            --health-cmd pg_isready \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:16-alpine
          
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec postgres-build-${{ github.run_id }} pg_isready -U postgres; do sleep 2; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"

      - name: Build application
        run: npm run build

      - name: Cleanup PostgreSQL
        if: always()
        run: |
          docker stop postgres-build-${{ github.run_id }} || true
          docker rm postgres-build-${{ github.run_id }} || true

  lint:
    name: Lint
    runs-on: self-hosted
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.4

      - name: Run Biome
        run: biome ci .

  e2e:
    name: E2E Tests (Playwright)
    runs-on: self-hosted
    needs: [lint, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres-e2e-${{ github.run_id }} \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=test \
            -p 5432:5432 \
            --health-cmd pg_isready \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:16-alpine
          
          echo "Waiting for PostgreSQL to be ready..."
          timeout 60 bash -c 'until docker exec postgres-e2e-${{ github.run_id }} pg_isready -U postgres; do sleep 2; done'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"

      - name: Run Playwright tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test?schema=public"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Cleanup PostgreSQL
        if: always()
        run: |
          docker stop postgres-e2e-${{ github.run_id }} || true
          docker rm postgres-e2e-${{ github.run_id }} || true
